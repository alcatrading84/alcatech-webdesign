<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>AlcaTech-WebDesign | Ingeniería Digital de Autor</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{background:#050912;color:#EAF0FF;font-family:-apple-system,system-ui,sans-serif;overflow-x:hidden}
        canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.6}
        section{position:relative;z-index:1}
        .glass-card{background:rgba(14,21,38,0.7);backdrop-filter:blur(10px);border:1px solid rgba(120,150,220,0.12);border-radius:18px;transition:all 0.3s ease}
        input, select, textarea{background:rgba(9,15,28,0.8);border:1px solid rgba(120,150,220,0.2);color:white;padding:12px;border-radius:10px;outline:none;width:100%}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const App = () => {
    const canvasRef = useRef(null);
    const [chatOpen, setChatOpen] = useState(false);
    const [userRating, setUserRating] = useState(0);
    const [reviews, setReviews] = useState([
        { id: 1, name: "Pedro Martínez", role: "CEO, Inversiones del Sur", product: "Web Empresarial", rating: 5, comment: "Excelente trabajo, carga rapidísimo.", date: "Junio 2026" },
        { id: 2, name: "Ana García", role: "Directora, MediSalud", product: "Landing Premium", rating: 5, comment: "Diseño impecable y muy profesional.", date: "Mayo 2026" }
    ]);

    // LÓGICA DE PARTÍCULAS
    useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;

        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.addEventListener('resize', resize);
        resize();

        for(let i=0; i<85; i++) {
            particles.push({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
                r: Math.random()*2+1
            });
        }

        const animate = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx*=-1;
                if(p.y<0 || p.y>canvas.height) p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(46, 107, 255, 0.4)'; ctx.fill();
                
                for(let j=i+1; j<particles.length; j++){
                    const p2 = particles[j];
                    const dist = Math.hypot(p.x-p2.x, p.y-p2.y);
                    if(dist<150){
                        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p2.x,p2.y);
                        ctx.strokeStyle = `rgba(46,107,255,${0.15*(1-dist/150)})`;
                        ctx.lineWidth = 0.5; ctx.stroke();
                    }
                }
            });
            animationId = requestAnimationFrame(animate);
        };
        animate();
        return () => { cancelAnimationFrame(animationId); window.removeEventListener('resize', resize); };
    }, []);

    return (
        <div style={{ minHeight: '100vh' }}>
            <canvas ref={canvasRef} />
            
            {/* NAV */}
            <nav style={{ position: 'fixed', top: 0, width: '100%', zIndex: 100, background: 'rgba(7,11,20,0.8)', backdropFilter: 'blur(10px)', borderBottom: '1px solid rgba(255,255,255,0.05)', height: '70px', display: 'flex', alignItems: 'center' }}>
                <div style={{ maxWidth: '1200px', margin: '0 auto', width: '100%', padding: '0 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div style={{ fontWeight: 900, fontSize: '20px' }}>ALCA<span style={{ color: '#2E6BFF' }}>TECH</span></div>
                    <div style={{ display: 'flex', gap: '30px', fontSize: '14px' }}>
                        <a href="#servicios" style={{ color: '#9BA8C0' }}>Servicios</a>
                        <a href="#planes" style={{ color: '#9BA8C0' }}>Planes</a>
                        <a href="#evaluaciones" style={{ color: '#9BA8C0' }}>Evaluaciones</a>
                    </div>
                </div>
            </nav>

            {/* HERO */}
            <section style={{ paddingTop: '150px', textAlign: 'center' }}>
                <h1 style={{ fontSize: '4rem', fontWeight: 900, marginBottom: '20px' }}>Digital que <span style={{ color: '#2E6BFF' }}>impulsa negocios.</span></h1>
                <button style={{ background: '#2E6BFF', border: 'none', padding: '15px 30px', borderRadius: '12px', color: 'white', fontWeight: 700, cursor: 'pointer' }}>◉ Hablar por WhatsApp</button>
            </section>

            {/* EVALUACIONES INTERACTIVAS */}
            <section id="evaluaciones" style={{ padding: '100px 20px' }}>
                <div style={{ maxWidth: '1100px', margin: '0 auto' }}>
                    <div style={{ color: '#2E6BFF', fontSize: '11px', fontWeight: 700, letterSpacing: '2px', marginBottom: '10px' }}>05 / EVALUACIONES</div>
                    <h2 style={{ fontSize: '40px', fontWeight: 900, marginBottom: '40px' }}>Lo que opinan nuestros clientes.</h2>
                    
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 350px', gap: '30px' }}>
                        <div style={{ display: 'grid', gap: '20px' }}>
                            {reviews.map(r => (
                                <div key={r.id} className="glass-card" style={{ padding: '20px' }}>
                                    <div style={{ color: '#FFB800', marginBottom: '10px' }}>{'★'.repeat(r.rating)}</div>
                                    <p style={{ fontStyle: 'italic', color: '#9BA8C0' }}>"{r.comment}"</p>
                                    <div style={{ marginTop: '15px', fontWeight: 700 }}>{r.name} - <span style={{ fontWeight: 400, color: '#6B7896' }}>{r.product}</span></div>
                                </div>
                            ))}
                        </div>

                        <div className="glass-card" style={{ padding: '30px' }}>
                            <h3>Danos tu opinión</h3>
                            <div style={{ margin: '20px 0' }}>
                                <div style={{ marginBottom: '10px' }}>Puntuación:</div>
                                {[1,2,3,4,5].map(s => (
                                    <span key={s} onClick={() => setUserRating(s)} style={{ fontSize: '30px', cursor: 'pointer', color: s <= userRating ? '#FFB800' : '#222' }}>★</span>
                                ))}
                            </div>
                            <textarea placeholder="Tu experiencia..." style={{ height: '100px', marginBottom: '15px' }}></textarea>
                            <button style={{ width: '100%', background: '#2E6BFF', border: 'none', color: 'white', padding: '12px', borderRadius: '8px', fontWeight: 700 }}>Publicar</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
