*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#010224;--bg2:#091e42;--bg3:#0d1117;--accent:#0052cc;--accent2:#079de0;--accent3:#058aaa;--text:#f1f5f9;--text2:rgba(255,255,255,0.5);--text3:rgba(255,255,255,0.3);--gold:#fbbf24}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.25rem 2rem;display:flex;justify-content:space-between;align-items:center;background:rgba(1,2,36,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.05)}
nav .logo{font-size:1.25rem;font-weight:700}
nav .logo span{color:var(--accent)}
nav .nav-links{display:flex;gap:2rem;align-items:center}
nav .nav-links a{color:var(--text2);text-decoration:none;font-size:.875rem;transition:color .2s;cursor:pointer}
nav .nav-links a:hover{color:#fff}
.lang-btn{background:rgba(0,82,204,0.15);border:1px solid rgba(0,82,204,0.2);color:var(--accent2);padding:.35rem .75rem;border-radius:6px;font-size:.8rem;font-weight:600;cursor:pointer;transition:.2s}
.lang-btn:hover{background:rgba(0,82,204,0.25)}
section{padding:5rem 2rem}
.inner{max-width:1100px;margin:0 auto}
.label{font-size:.8rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem}
h2.section-title{font-size:clamp(2rem,4vw,2.75rem);font-weight:700;letter-spacing:-.02em;line-height:1.15;margin-bottom:1rem}
.desc{font-size:1.05rem;color:var(--text2);max-width:600px;line-height:1.7;margin-bottom:2.5rem}

/* Hero */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:6rem 2rem 4rem;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0;background-image:linear-gradient(rgba(0,82,204,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,82,204,0.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 50% at 50% 50%,black,transparent)}
.hero-glow{position:absolute;top:50%;left:50%;width:700px;height:700px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(0,82,204,0.1) 0%,transparent 70%);z-index:0}
.hero>*{position:relative;z-index:1}
.hero-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.5rem 1rem;background:rgba(0,82,204,0.1);border:1px solid rgba(0,82,204,0.2);border-radius:100px;font-size:.8rem;color:var(--accent2);margin-bottom:2rem}
.hero h1{font-size:clamp(2.5rem,7vw,4.5rem);font-weight:800;letter-spacing:-.03em;line-height:1.05;margin-bottom:1.25rem;max-width:800px}
.hero h1 .g{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:1.15rem;color:var(--text2);max-width:520px;line-height:1.7;margin-bottom:2rem}
.btn{background:var(--accent);color:#fff;border:none;padding:.9rem 1.75rem;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:.5rem;text-decoration:none}
.btn:hover{background:#0065e6;transform:translateY(-1px)}
.btn-o{background:transparent;color:var(--text2);border:1px solid rgba(255,255,255,0.1);padding:.9rem 1.75rem;border-radius:8px;font-size:.95rem;font-weight:500;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:.5rem;text-decoration:none}
.btn-o:hover{border-color:rgba(255,255,255,0.3);color:#fff}
.btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}

.stats{display:flex;justify-content:center;gap:3.5rem;margin-top:3.5rem;padding-top:2.5rem;border-top:1px solid rgba(255,255,255,0.05)}
.stats .n{font-size:2rem;font-weight:700}
.stats .l{font-size:.85rem;color:var(--text3);margin-top:.25rem}
.c-accent{color:var(--accent)}.c-accent2{color:var(--accent2)}.c-accent3{color:var(--accent3)}

/* Cards grid */
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem}

.card .icon{font-size:1.75rem;margin-bottom:.75rem}
.card h3{font-size:1.2rem;font-weight:600;margin-bottom:.5rem}

.card .range{font-size:.85rem;color:var(--text3);margin-bottom:.75rem}

.process{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:2rem;text-align:center}
.process .step .n{width:44px;height:44px;border-radius:50%;background:rgba(0,82,204,0.15);border:1px solid rgba(0,82,204,0.2);display:flex;align-items:center;justify-content:center;font-size:1.15rem;font-weight:700;color:var(--accent);margin:0 auto .75rem}

.table-wrap{overflow-x:auto;margin:2rem 0}
table{width:100%;min-width:700px;border-collapse:collapse}
th{padding:1rem .75rem;text-align:center;font-size:.9rem;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.08)}

td{padding:1rem .75rem;text-align:center;font-size:.9rem;color:var(--text2);border-bottom:1px solid rgba(255,255,255,0.04)}
td:first-child{text-align:left;font-weight:600;color:var(--accent2);font-size:1rem}
tr:hover td{background:rgba(0,82,204,0.03)}
tr:nth-child(even) td{background:rgba(255,255,255,0.01)}

/* Testimonials */
.t-card{background:rgba(9,30,66,0.4);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:1.75rem}
.t-card .stars{color:var(--gold);font-size:1rem;margin-bottom:.75rem}
.t-card p{font-size:.9rem;color:var(--text2);line-height:1.7;font-style:italic;margin-bottom:1.25rem}
.t-card .name{font-weight:600;font-size:.85rem}
.t-card .role-name{font-size:.8rem;color:var(--text3)}
.t-card .v{color:#007252;font-size:.8rem;font-weight:600;margin-top:.25rem}

.cta p{color:var(--text2);max-width:480px;margin:0 auto 2rem;line-height:1.7;font-size:1rem}

.legal-content .box h4{font-size:1rem;font-weight:600;margin-bottom:.5rem;color:#fff}
.legal-content .box p{font-size:.85rem;color:var(--text2);line-height:1.7;margin-bottom:.75rem}

.lang-menu{position:relative;display:inline-block}
.lang-dropdown{position:absolute;top:100%;right:0;margin-top:.25rem;background:var(--bg2);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:.25rem;min-width:130px;display:none;z-index:200}

.lang-dropdown button:hover{background:rgba(0,82,204,0.15);color:#fff}

/* Scrollbar */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:10px}

@media(max-width:768px){

  nav .nav-links a.nav-hide{display:none}
  .stats{gap:2rem;flex-wrap:wrap}
  .stats .n{font-size:1.5rem}
}
</style>

function toggleLegal(i){

}
