<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AlcaTech-WebDesign | Ingeniería Digital de Autor</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#070B14;color:#EAF0FF;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none}
input::placeholder{color:#4A5570}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2E6BFF;border-radius:99px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const App = () => {
    const canvasRef = useRef(null);
    const [chatOpen, setChatOpen] = useState(false);

    useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        let animationFrameId;

        const resize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        const COUNT = 90;

        for (let i = 0; i < COUNT; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.6,
                vy: (Math.random() - 0.5) * 0.6,
                r: Math.random() * 2.5 + 1,
                op: Math.random() * 0.5 + 0.5,
            });
        }

        const animate = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                // Punto brillante
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(80, 140, 255, ${p.op})`;
                ctx.fill();

                // Glow alrededor del punto
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
                const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3);
                grd.addColorStop(0, `rgba(46, 107, 255, 0.25)`);
                grd.addColorStop(1, `rgba(46, 107, 255, 0)`);
                ctx.fillStyle = grd;
                ctx.fill();

                // Líneas de conexión
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p.x - p2.x;
                    const dy = p.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 160) {
                        const alpha = 0.55 * (1 - dist / 160);
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(80, 140, 255, ${alpha})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            });

            animationFrameId = requestAnimationFrame(animate);
        };

        animate();
        return () => {
            window.removeEventListener('resize', resize);
            cancelAnimationFrame(animationFrameId);
        };
    }, []);

    return (
        <div style={{ minHeight: '100vh', background: '#070B14', color: '#EAF0FF', fontFamily: 'Arial, sans-serif', position: 'relative', overflowX: 'hidden' }}>

            {/* Canvas animado de fondo */}
            <canvas ref={canvasRef} style={{ position: 'fixed', inset: 0, zIndex: 0, pointerEvents: 'none' }} />

            {/* Glow radial decorativo */}
            <div style={{ position: 'fixed', top: '-200px', right: '-200px', width: '700px', height: '700px', borderRadius: '50%', background: 'radial-gradient(circle, rgba(46,107,255,0.18) 0%, transparent 70%)', zIndex: 0, pointerEvents: 'none' }} />
            <div style={{ position: 'fixed', bottom: '-200px', left: '-200px', width: '600px', height: '600px', borderRadius: '50%', background: 'radial-gradient(circle, rgba(46,107,255,0.10) 0%, transparent 70%)', zIndex: 0, pointerEvents: 'none' }} />

            {/* NAVBAR */}
            <nav style={{ position: 'fixed', top: 0, width: '100%', zIndex: 50, background: 'rgba(7,11,20,0.85)', backdropFilter: 'blur(14px)', borderBottom: '1px solid rgba(120,150,220,0.12)', height: '72px', display: 'flex', alignItems: 'center' }}>
                <div style={{ maxWidth: '1200px', margin: '0 auto', width: '100%', padding: '0 32px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div style={{ fontSize: '22px', fontWeight: 900, letterSpacing: '-1px' }}>ALCA<span style={{ color: '#2E6BFF' }}>TECH</span></div>
                    <div style={{ display: 'flex', gap: '32px', fontSize: '14px', color: '#9BA8C0' }}>
                        <a href="#servicios" style={{ color: '#9BA8C0', textDecoration: 'none' }}>Servicios</a>
                        <a href="#planes" style={{ color: '#9BA8C0', textDecoration: 'none' }}>Planes</a>
                        <a href="#contacto" style={{ color: '#9BA8C0', textDecoration: 'none' }}>Contacto</a>
                    </div>
                    <button style={{ background: '#2E6BFF', color: 'white', border: 'none', borderRadius: '10px', padding: '11px 20px', fontWeight: 700, fontSize: '14px', cursor: 'pointer', boxShadow: '0 0 24px rgba(46,107,255,0.4)' }}>Hablemos ↗</button>
                </div>
            </nav>

            {/* HERO */}
            <section style={{ position: 'relative', zIndex: 1, paddingTop: '140px', paddingBottom: '80px' }}>
                <div style={{ maxWidth: '1200px', margin: '0 auto', padding: '0 32px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '64px', alignItems: 'center' }}>
                    <div>
                        <div style={{ display: 'inline-flex', alignItems: 'center', gap: '8px', background: 'rgba(46,107,255,0.1)', border: '1px solid rgba(46,107,255,0.3)', borderRadius: '99px', padding: '6px 14px', color: '#2E6BFF', fontSize: '11px', fontWeight: 700, letterSpacing: '2px', marginBottom: '24px' }}>
                            <span style={{ width: '6px', height: '6px', borderRadius: '50%', background: '#2E6BFF', display: 'inline-block' }}></span>
                            INGENIERÍA DE AUTOR
                        </div>
                        <h1 style={{ fontSize: '64px', fontWeight: 900, lineHeight: 1.04, letterSpacing: '-3px', margin: '0 0 24px' }}>
                            Ingeniería digital que <span style={{ color: '#2E6BFF' }}>impulsa negocios.</span>
                        </h1>
                        <p style={{ fontSize: '18px', color: '#9BA8C0', maxWidth: '520px', lineHeight: 1.6, marginBottom: '36px' }}>
                            Diseño, rendimiento y estrategia para convertir tu presencia digital en un sistema que inspira confianza, vende y escala.
                        </p>
                        <div style={{ display: 'flex', gap: '14px', flexWrap: 'wrap', marginBottom: '32px' }}>
                            <button style={{ background: '#2E6BFF', color: 'white', border: 'none', borderRadius: '12px', padding: '14px 24px', fontWeight: 700, fontSize: '15px', cursor: 'pointer', boxShadow: '0 8px 28px rgba(46,107,255,0.35)' }}>◉ Hablar por WhatsApp</button>
                            <button style={{ background: 'transparent', color: '#EAF0FF', border: '1px solid rgba(120,150,220,0.2)', borderRadius: '12px', padding: '14px 24px', fontWeight: 700, fontSize: '15px', cursor: 'pointer' }}>Ver servicios →</button>
                        </div>
                        <div style={{ display: 'flex', gap: '20px', fontSize: '13px', color: '#6B7896' }}>
                            {['Tecnología', 'Rendimiento', 'Estrategia', 'Resultados'].map((c, i) => (
                                <span key={c} style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                    {i > 0 && <span style={{ color: '#2E6BFF' }}>·</span>}
                                    {c}
                                </span>
                            ))}
                        </div>
                    </div>

                    {/* Dashboard */}
                    <div style={{ position: 'relative' }}>
                        <div style={{ position: 'absolute', inset: '-2px', background: 'linear-gradient(135deg, rgba(46,107,255,0.5), rgba(46,107,255,0.05))', borderRadius: '20px', filter: 'blur(1px)', zIndex: -1 }} />
                        <div style={{ background: 'linear-gradient(135deg, rgba(20,35,70,0.95), rgba(10,15,28,0.92))', border: '1px solid rgba(46,107,255,0.4)', borderRadius: '18px', padding: '28px', boxShadow: '0 0 60px rgba(46,107,255,0.2), 0 30px 60px rgba(0,0,0,0.4)', transform: 'perspective(1000px) rotateY(-5deg) rotateX(2deg)' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', borderBottom: '1px solid rgba(120,150,220,0.1)', paddingBottom: '16px', marginBottom: '22px', fontSize: '10px', color: '#6B7896', letterSpacing: '1px' }}>
                                <span>ALCATECH / PERFORMANCE INDEX</span>
                                <span style={{ color: '#8CE04A', display: 'flex', alignItems: 'center', gap: '5px' }}>● SISTEMA ACTIVO</span>
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: '140px 1fr', gap: '20px', alignItems: 'center' }}>
                                <div style={{ position: 'relative', width: '130px', height: '130px' }}>
                                    <svg width="130" height="130" style={{ transform: 'rotate(-90deg)' }}>
                                        <circle cx="65" cy="65" r="56" stroke="rgba(255,255,255,0.05)" strokeWidth="10" fill="none" />
                                        <circle cx="65" cy="65" r="56" stroke="#8CE04A" strokeWidth="10" fill="none"
                                            strokeDasharray={2 * Math.PI * 56}
                                            strokeDashoffset={2 * Math.PI * 56 * 0.06}
                                            strokeLinecap="round" />
                                    </svg>
                                    <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center' }}>
                                        <span style={{ fontSize: '34px', fontWeight: 900, lineHeight: 1 }}>94</span>
                                        <span style={{ fontSize: '9px', color: '#6B7896', letterSpacing: '1px' }}>HEALTH SCORE</span>
                                    </div>
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                    {[['Rendimiento', '98/100'], ['Accesibilidad', '100/100'], ['SEO técnico', '96/100'], ['Seguridad', 'SSL activo']].map(([k, v]) => (
                                        <div key={k} style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px', borderBottom: '1px solid rgba(120,150,220,0.08)', paddingBottom: '10px' }}>
                                            <span style={{ color: '#9BA8C0' }}>{k}</span>
                                            <span style={{ fontWeight: 700 }}>{v}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div style={{ marginTop: '20px', borderTop: '1px solid rgba(120,150,220,0.1)', paddingTop: '16px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                                <div>
                                    <div style={{ fontSize: '9px', color: '#6B7896', letterSpacing: '1px' }}>CARGA PROMEDIO</div>
                                    <div style={{ fontSize: '42px', fontWeight: 900, letterSpacing: '-3px', lineHeight: 1 }}>0.8<span style={{ fontSize: '16px', color: '#2E6BFF' }}>s</span></div>
                                </div>
                                <div style={{ fontSize: '11px', color: '#8CE04A', fontWeight: 700, textAlign: 'right' }}>↑ +42% Conversión<br /><span style={{ color: '#6B7896', fontWeight: 400 }}>proyectada</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            {/* MÉTRICAS */}
            <div style={{ position: 'relative', zIndex: 1, borderTop: '1px solid rgba(120,150,220,0.1)', borderBottom: '1px solid rgba(120,150,220,0.1)' }}>
                <div style={{ maxWidth: '1200px', margin: '0 auto', padding: '0 32px', display: 'grid', gridTemplateColumns: 'repeat(4,1fr)' }}>
                    {[['40+', 'Proyectos completados'], ['98%', 'Satisfacción de clientes'], ['95+', 'Puntuación Lighthouse'], ['100%', 'Sitios seguros SSL']].map(([n, l], i) => (
                        <div key={l} style={{ padding: '28px 24px', borderRight: i < 3 ? '1px solid rgba(120,150,220,0.1)' : 'none' }}>
                            <div style={{ fontSize: '30px', fontWeight: 900, letterSpacing: '-1px', color: '#2E6BFF' }}>{n}</div>
                            <div style={{ fontSize: '13px', color: '#6B7896', marginTop: '4px' }}>{l}</div>
                        </div>
                    ))}
                </div>
            </div>

            {/* SERVICIOS */}
            <section id="servicios" style={{ position: 'relative', zIndex: 1, padding: '100px 0' }}>
                <div style={{ maxWidth: '1200px', margin: '0 auto', padding: '0 32px' }}>
                    <div style={{ marginBottom: '48px' }}>
                        <div style={{ color: '#2E6BFF', fontSize: '11px', fontWeight: 700, letterSpacing: '2px', marginBottom: '12px' }}>01 / SOLUCIONES DIGITALES</div>
                        <h2 style={{ fontSize: '46px', fontWeight: 900, letterSpacing: '-2px', margin: 0 }}>Hechas <span style={{ color: '#2E6BFF' }}>a la medida</span> de tu negocio.</h2>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: '20px' }}>
                        {[
                            ['◈', 'Web de alto rendimiento', 'Sitios rápidos, claros y construidos para convertir visitas en oportunidades.'],
                            ['◌', 'E-commerce escalable', 'Tiendas preparadas para vender con una experiencia de compra sin fricción.'],
                            ['⌘', 'Sistemas y automatización', 'Procesos digitales que reducen trabajo manual y hacen crecer la operación.'],
                            ['◫', 'Diseño de producto', 'Interfaces sobrias y memorables diseñadas alrededor de objetivos reales.'],
                            ['↗', 'SEO técnico', 'Arquitectura, velocidad y contenido para que tu negocio sea encontrable.'],
                            ['✦', 'IA para negocio', 'Asistentes seguros que atienden, orientan y capturan oportunidades.'],
                        ].map(([icon, title, desc]) => (
                            <div key={title} style={{ background: 'rgba(14,21,38,0.75)', border: '1px solid rgba(120,150,220,0.14)', borderRadius: '16px', padding: '28px', transition: 'all 0.25s', cursor: 'default' }}
                                onMouseEnter={e => { e.currentTarget.style.borderColor = 'rgba(46,107,255,0.6)'; e.currentTarget.style.transform = 'translateY(-4px)'; e.currentTarget.style.boxShadow = '0 0 30px rgba(46,107,255,0.15)'; }}
                                onMouseLeave={e => { e.currentTarget.style.borderColor = 'rgba(120,150,220,0.14)'; e.currentTarget.style.transform = 'none'; e.currentTarget.style.boxShadow = 'none'; }}>
                                <div style={{ fontSize: '26px', color: '#2E6BFF' }}>{icon}</div>
                                <h3 style={{ fontSize: '18px', fontWeight: 700, margin: '20px 0 10px', letterSpacing: '-0.5px' }}>{title}</h3>
                                <p style={{ fontSize: '14px', color: '#9BA8C0', margin: 0, lineHeight: 1.6 }}>{desc}</p>
                            </div>
                        ))}
                    </div>
                </div>
            </section>

            {/* PLANES */}
            <section id="planes" style={{ position: 'relative', zIndex: 1, padding: '100px 0', background: 'linear-gradient(180deg, transparent, rgba(25,48,105,0.15), transparent)' }}>
                <div style={{ maxWidth: '1200px', margin: '0 auto', padding: '0 32px' }}>
                    <div style={{ textAlign: 'center', marginBottom: '56px' }}>
                        <div style={{ color: '#2E6BFF', fontSize: '11px', fontWeight: 700, letterSpacing: '2px', marginBottom: '12px' }}>02 / PLANES DESTACADOS</div>
                        <h2 style={{ fontSize: '46px', fontWeight: 900, letterSpacing: '-2px', margin: 0 }}>Elige el plan que se adapte a <span style={{ color: '#2E6BFF' }}>tu negocio.</span></h2>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: '22px', alignItems: 'center' }}>
                        {[
                            { name: 'Landing de Autor', price: '€297', range: 'Ideal para empezar', items: ['Diseño a medida', 'Landing optimizada', 'Formulario de contacto', 'SEO esencial'], featured: false },
                            { name: 'E-commerce High-Performance', price: '€1.297', range: 'La opción más elegida', items: ['Todo lo del plan Landing', 'Catálogo y pagos online', 'Optimización de conversión', 'Panel de gestión', 'Soporte de lanzamiento'], featured: true },
                            { name: 'SaaS Enterprise', price: '€2.497', range: 'Proyectos a medida', items: ['Arquitectura técnica', 'Automatizaciones', 'Integraciones avanzadas', 'Escalabilidad'], featured: false },
                        ].map(plan => (
                            <div key={plan.name} style={{ position: 'relative', background: plan.featured ? 'linear-gradient(180deg,rgba(22,37,73,0.95),rgba(14,21,38,0.9))' : 'rgba(14,21,38,0.75)', border: plan.featured ? '2px solid rgba(46,107,255,0.8)' : '1px solid rgba(120,150,220,0.14)', borderRadius: '18px', padding: '32px', transform: plan.featured ? 'scale(1.04)' : 'none', boxShadow: plan.featured ? '0 0 60px rgba(46,107,255,0.2)' : 'none' }}>
                                {plan.featured && <div style={{ position: 'absolute', top: '-14px', left: '50%', transform: 'translateX(-50%)', background: '#2E6BFF', color: 'white', fontSize: '10px', fontWeight: 700, letterSpacing: '1.5px', padding: '6px 14px', borderRadius: '99px' }}>RECOMENDADO</div>}
                                <h3 style={{ fontSize: '19px', fontWeight: 700, margin: '0 0 8px' }}>{plan.name}</h3>
                                <div style={{ fontSize: '44px', fontWeight: 900, letterSpacing: '-2px', margin: '20px 0 4px', color: plan.featured ? '#2E6BFF' : '#EAF0FF' }}>{plan.price}</div>
                                <div style={{ fontSize: '12px', color: '#6B7896', borderBottom: '1px solid rgba(120,150,220,0.1)', paddingBottom: '20px', marginBottom: '20px' }}>{plan.range}</div>
                                <ul style={{ listStyle: 'none', padding: 0, margin: '0 0 28px' }}>
                                    {plan.items.map(item => (
                                        <li key={item} style={{ fontSize: '13px', color: '#9BA8C0', margin: '12px 0' }}>
                                            <span style={{ color: '#2E6BFF', fontWeight: 700, marginRight: '8px' }}>✓</span>{item}
                                        </li>
                                    ))}
                                </ul>
                                <button style={{ width: '100%', padding: '14px', borderRadius: '12px', border: plan.featured ? 'none' : '1px solid rgba(120,150,220,0.2)', background: plan.featured ? '#2E6BFF' : 'transparent', color: 'white', fontWeight: 700, fontSize: '14px', cursor: 'pointer', boxShadow: plan.featured ? '0 8px 24px rgba(46,107,255,0.35)' : 'none' }}>
                                    {plan.featured ? 'Contratar plan →' : 'Consultar'}
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            </section>

            {/* CTA FINAL */}
            <section id="contacto" style={{ position: 'relative', zIndex: 1, padding: '80px 0 120px' }}>
                <div style={{ maxWidth: '1200px', margin: '0 auto', padding: '0 32px' }}>
                    <div style={{ background: 'radial-gradient(circle at 12% 50%, rgba(46,107,255,0.3), transparent 35%), rgba(14,21,38,0.8)', border: '1px solid rgba(46,107,255,0.35)', borderRadius: '20px', padding: '40px 48px', display: 'grid', gridTemplateColumns: 'auto 1fr auto', gap: '32px', alignItems: 'center' }}>
                        <div style={{ width: '60px', height: '60px', background: 'rgba(46,107,255,0.2)', border: '1px solid rgba(46,107,255,0.4)', borderRadius: '16px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '22px', fontWeight: 900, color: '#2E6BFF' }}>A</div>
                        <div>
                            <h2 style={{ fontSize: '30px', fontWeight: 900, letterSpacing: '-1px', margin: '0 0 8px' }}>¿Listo para llevar tu proyecto al <span style={{ color: '#2E6BFF' }}>siguiente nivel?</span></h2>
                            <p style={{ margin: 0, color: '#9BA8C0', fontSize: '14px' }}>Cuéntame dónde estás hoy y diseñemos una solución con dirección y propósito.</p>
                        </div>
                        <button style={{ background: '#2E6BFF', color: 'white', border: 'none', borderRadius: '12px', padding: '16px 28px', fontWeight: 700, fontSize: '15px', cursor: 'pointer', whiteSpace: 'nowrap', boxShadow: '0 8px 28px rgba(46,107,255,0.4)' }}>◉ Hablar por WhatsApp</button>
                    </div>
                </div>
            </section>

            {/* CHAT SOFÍA */}
            {chatOpen && (
                <div style={{ position: 'fixed', bottom: '90px', right: '22px', width: '320px', background: '#0C1323', border: '1px solid rgba(46,107,255,0.4)', borderRadius: '18px', boxShadow: '0 20px 60px rgba(0,0,0,0.5)', zIndex: 100, overflow: 'hidden' }}>
                    <div style={{ padding: '16px 20px', background: 'linear-gradient(135deg,#183672,#0d1932)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div>
                            <div style={{ fontWeight: 700, fontSize: '14px' }}>Sofía · AlcaTech AI</div>
                            <div style={{ fontSize: '11px', color: '#aebeda' }}>Asistente Virtual Activa</div>
                        </div>
                        <button onClick={() => setChatOpen(false)} style={{ background: 'none', border: 'none', color: 'white', fontSize: '20px', cursor: 'pointer' }}>×</button>
                    </div>
                    <div style={{ padding: '16px', height: '220px', overflowY: 'auto' }}>
                        <div style={{ background: 'rgba(255,255,255,0.06)', borderRadius: '12px', padding: '12px', fontSize: '13px', color: '#9BA8C0' }}>
                            Hola, soy Sofía. ¿En qué puedo ayudarte a impulsar tu negocio digital hoy?
                        </div>
                    </div>
                    <div style={{ padding: '12px', borderTop: '1px solid rgba(120,150,220,0.1)', display: 'flex', gap: '8px' }}>
                        <input placeholder="Escribe tu consulta..." style={{ flex: 1, background: '#090F1C', border: '1px solid rgba(120,150,220,0.15)', borderRadius: '8px', padding: '10px 12px', color: 'white', fontSize: '13px', outline: 'none' }} />
                        <button style={{ background: '#2E6BFF', border: 'none', borderRadius: '8px', color: 'white', padding: '0 14px', cursor: 'pointer', fontWeight: 700 }}>↑</button>
                    </div>
                </div>
            )}
            <button onClick={() => setChatOpen(!chatOpen)} style={{ position: 'fixed', bottom: '22px', right: '22px', width: '58px', height: '58px', borderRadius: '50%', background: '#2E6BFF', border: 'none', color: 'white', fontSize: '22px', cursor: 'pointer', boxShadow: '0 10px 35px rgba(46,107,255,0.5)', zIndex: 100 }}>✦</button>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
